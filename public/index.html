<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>workbench-mini</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0b0d10; color: #e2e2e2; font: 14px/1.6 system-ui, sans-serif;
         height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; gap: 1rem; align-items: center; padding: .8rem 1.2rem;
           background: #14171c; border-bottom: 1px solid #23272e; flex-wrap: wrap; }
  header .title { font-weight: 700; letter-spacing: .06em; color: #6ee7ff; }
  header .ws { color: #8c8c8c; font-size: 12px; }
  select { background: #0b0d10; color: #e2e2e2; border: 1px solid #2b313a; padding: .35rem .5rem; }
  #chat { flex: 1; overflow-y: auto; padding: 1.2rem; display: flex; flex-direction: column; gap: .8rem; }
  .msg { max-width: 85%; padding: .7rem 1rem; white-space: pre-wrap; overflow-wrap: anywhere;
         border-radius: 6px; }
  .user { align-self: flex-end; background: #1c2733; }
  .assistant { align-self: flex-start; background: #14171c; }
  .toolcard { align-self: flex-start; font-family: ui-monospace, monospace; font-size: 12px;
              color: #8c8c8c; border-left: 2px solid #6ee7ff; padding: .3rem .8rem; }
  .approve { border-left-color: #ffb52e; color: #e2e2e2; background: #191510; padding: .7rem 1rem; }
  .approve .diff { font-size: 12px; white-space: pre-wrap; margin: .5rem 0; max-height: 200px; overflow-y: auto; }
  .approve .del { color: #ff7b72; } .approve .add { color: #7ee787; }
  .approve button { margin-right: .5rem; background: none; border: 1px solid #2b313a;
                    color: #e2e2e2; padding: .3rem .8rem; cursor: pointer; }
  form { display: flex; gap: .8rem; padding: .8rem 1.2rem; background: #14171c; }
  input { flex: 1; background: #0b0d10; border: 1px solid #2b313a; color: #e2e2e2; padding: .6rem .8rem; }
  form button { background: #6ee7ff22; border: 1px solid #6ee7ff; color: #6ee7ff; padding: 0 1.2rem; cursor: pointer; }
</style>
</head>
<body>
<header>
  <span class="title">WORKBENCH-MINI</span>
  <label>model <select id="model"></select></label>
  <label>perms <select id="mode">
    <option value="ask">Ask</option>
    <option value="plan">Plan (read-only)</option>
    <option value="auto">Auto</option>
  </select></label>
  <span class="ws" id="ws"></span>
</header>
<main id="chat"></main>
<form id="composer">
  <input id="input" placeholder="instruct the agent…" autocomplete="off">
  <button type="submit">Send</button>
</form>
<script src="app.js"></script>
</body>
</html>
